<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Shredder - Professional Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-zinc-950 text-white p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold italic text-purple-500">SCRIPT SHREDDER</h1>
            <div class="flex gap-4">
                <button id="zipBtn" onclick="downloadAllAsZip()" class="hidden bg-green-600 hover:bg-green-500 px-6 py-2 rounded-lg font-bold transition-all shadow-lg shadow-green-900/20">
                    DOWNLOAD ALL (.ZIP)
                </button>
                <a href="index.html" class="bg-zinc-800 px-4 py-2 rounded-lg text-sm hover:bg-zinc-700 transition-colors">← Back</a>
            </div>
        </div>

        <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 mb-8 shadow-xl">
            <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Paste Full Ad Script</label>
            <textarea id="fullScript" rows="10" class="w-full bg-black border border-zinc-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 text-zinc-300 transition-all" placeholder="Paste your script here..."></textarea>
            
            <button onclick="shredAndGen()" id="actionBtn" class="w-full bg-purple-600 hover:bg-purple-500 mt-6 py-4 rounded-xl font-black text-lg transition-all shadow-lg shadow-purple-900/40 transform active:scale-[0.98]">
                SHRED & START GENERATION
            </button>
        </div>

        <h2 class="text-xl font-bold mb-4 px-2 flex items-center gap-2">
            Generated Clips 
            <span id="clipCount" class="text-xs bg-zinc-800 text-zinc-400 px-2 py-1 rounded-full hidden">0</span>
        </h2>
        <div id="clipsContainer" class="space-y-3 min-h-[200px]">
            <p class="text-zinc-600 px-2 italic text-sm">Waiting for script to shred...</p>
        </div>
    </div>

    <script>
        // Updated to your specific Voice ID
        const HARDCODED_VOICE = "moss_audio_567f5b7d-fdf2-11f0-acd1-ae8d6efa85ff";
        let generatedBlobs = []; 

        async function shredAndGen() {
            const script = document.getElementById('fullScript').value;
            const btn = document.getElementById('actionBtn');
            const container = document.getElementById('clipsContainer');
            const zipBtn = document.getElementById('zipBtn');
            const clipCount = document.getElementById('clipCount');
            
            if (!script) return alert("Paste a script first!");
            
            // UI Reset
            btn.disabled = true;
            btn.innerText = "GEMINI IS SLICING...";
            container.innerHTML = ""; 
            generatedBlobs = []; 
            zipBtn.classList.add('hidden');
            clipCount.classList.add('hidden');

            try {
                // FIXED: Using relative path for Render compatibility
                const shredRes = await fetch('/shred-script', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ script })
                });
                
                if (!shredRes.ok) throw new Error("Gemini failed to shred script");
                
                const chunks = await shredRes.json();
                btn.innerText = `GENERATING ${chunks.length} CLIPS...`;
                clipCount.innerText = chunks.length;
                clipCount.classList.remove('hidden');

                for (let i = 0; i < chunks.length; i++) {
                    const row = document.createElement('div');
                    row.className = "bg-zinc-900 p-5 rounded-xl border border-zinc-800 flex flex-col md:flex-row items-center gap-4 transition-all duration-500 animate-in fade-in slide-in-from-bottom-2";
                    row.innerHTML = `
                        <div class="flex-grow w-full md:w-auto">
                            <div class="text-[10px] text-purple-500 font-bold mb-1 uppercase tracking-widest">Segment ${i+1}</div>
                            <p class="text-sm text-zinc-300 italic line-clamp-2 hover:line-clamp-none transition-all">"${chunks[i]}"</p>
                        </div>
                        <div id="status-${i}" class="flex items-center gap-3 min-w-[280px] justify-end w-full md:w-auto">
                            <span class="text-xs text-zinc-600 animate-pulse">Synthesizing Audio...</span>
                        </div>
                    `;
                    container.appendChild(row);

                    // FIXED: Using relative path for Render compatibility
                    fetch('/generate-audio', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            text: chunks[i], 
                            model: "speech-2.8-hd", 
                            voice_id: HARDCODED_VOICE 
                        })
                    })
                    .then(res => res.json())
                    .then(result => {
                        if (result.data && result.data.audio) {
                            const hex = result.data.audio;
                            const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                            const blob = new Blob([bytes], {type: 'audio/mp3'});
                            const url = URL.createObjectURL(blob);
                            
                            generatedBlobs.push({ name: `clip_${i+1}.mp3`, blob: blob });

                            document.getElementById(`status-${i}`).innerHTML = `
                                <audio controls src="${url}" class="h-8 w-48 bg-transparent"></audio>
                                <a href="${url}" download="clip_${i+1}.mp3" class="bg-blue-600 hover:bg-blue-500 p-2 px-4 rounded text-[10px] font-bold transition-colors">MP3</a>
                            `;

                            zipBtn.classList.remove('hidden');
                        } else {
                            document.getElementById(`status-${i}`).innerHTML = `<span class="text-red-500 text-xs text-nowrap">Error Generating</span>`;
                        }
                    })
                    .catch(err => {
                        document.getElementById(`status-${i}`).innerHTML = `<span class="text-red-500 text-xs">Failed</span>`;
                    });
                }
            } catch (err) {
                alert("Critical Error: " + err.message);
                btn.innerText = "ERROR - TRY AGAIN";
            } finally {
                btn.disabled = false;
                if(btn.innerText.includes("CLIPS")) btn.innerText = "GENERATION STARTED";
            }
        }

        async function downloadAllAsZip() {
            const zip = new JSZip();
            // Sort to ensure clips stay in order 1, 2, 3...
            generatedBlobs.sort((a, b) => {
                const numA = parseInt(a.name.match(/\d+/));
                const numB = parseInt(b.name.match(/\d+/));
                return numA - numB;
            });

            generatedBlobs.forEach(item => {
                zip.file(item.name, item.blob);
            });

            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `Ad_Campaign_${new Date().toISOString().slice(0,10)}.zip`;
            link.click();
        }
    </script>
</body>
</html>
